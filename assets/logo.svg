<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 150" width="100%" height="100%">
          
          <!-- Definição do Gradiente Linear -->
          <defs>
            <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#E843FF" />
              <stop offset="50%" stop-color="#8F56FF" />
              <stop offset="100%" stop-color="#219EFC" />
            </linearGradient>
          </defs>

          <!-- Ícone Externo (Quadrado com cantos arredondados e gradiente) -->
          <rect x="20" y="25" width="100" height="100" rx="30" ry="30" fill="url(#logoGrad)" />

          <!-- Ícone Interno (Contorno branco) -->
          <rect x="44" y="49" width="52" height="52" rx="16" ry="16" fill="none" stroke="#FFFFFF" stroke-width="7" />

        </svg>
